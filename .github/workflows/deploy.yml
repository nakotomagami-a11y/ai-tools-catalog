name: Deploy to arturas.digital

on:
  push:
    branches: [master, main]

concurrency:
  group: deploy-ai-tools-catalog
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-build-${{ github.sha }}
          path: out/
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy
    needs: build
    runs-on: [self-hosted, ravenhut]
    timeout-minutes: 5
    environment:
      name: production
      url: https://arturas.digital/lab/ai-tools-catalog/
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: static-build-${{ github.sha }}
          path: /tmp/deploy-ai-${{ github.run_id }}

      - name: Sync to live
        run: |
          mkdir -p /srv/sites/arturas.digital/lab/ai-tools-catalog
          rsync -a --delete --checksum \
            /tmp/deploy-ai-${{ github.run_id }}/ \
            /srv/sites/arturas.digital/lab/ai-tools-catalog/

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/deploy-ai-${{ github.run_id }}
